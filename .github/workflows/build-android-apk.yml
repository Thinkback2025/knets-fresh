name: Build Android APK (Ultra Simple)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        api-level: 33
        target: default
        arch: x86_64

    - name: Create Android icons
      working-directory: android
      run: |
        chmod +x create_icons.sh
        ./create_icons.sh

    - name: Build APK
      working-directory: android
      run: |
        chmod +x gradlew
        echo "Starting Gradle build..."
        ./gradlew clean assembleDebug --stacktrace --info
        
        echo "Build completed, checking outputs..."
        find . -type d -name "outputs" -exec ls -la {} \;
        find . -name "*.apk" -type f -exec ls -la {} \;
        
        # Ensure APK exists and copy to standard location
        mkdir -p outputs
        APK_PATH=$(find . -name "*.apk" -type f | head -1)
        if [ -n "$APK_PATH" ]; then
          cp "$APK_PATH" outputs/knets-jr-debug.apk
          echo "APK successfully created: $(ls -la outputs/)"
        else
          echo "ERROR: No APK file generated"
          echo "Checking build directory structure:"
          find app/build -type f -name "*.apk" 2>/dev/null || echo "No APK in app/build"
          exit 1
        fi

    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: knets-jr-debug-apk
        path: android/outputs/knets-jr-debug.apk
        retention-days: 30
