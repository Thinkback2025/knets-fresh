name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        api-level: 34
        build-tools: 34.0.0
      
    - name: Cache Gradle packages
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-
          
    - name: Grant execute permission for gradlew
      run: chmod +x android/gradlew
      
    - name: Clean project
      working-directory: android
      run: |
        echo "Cleaning project..."
        ./gradlew clean --stacktrace
      
    - name: Build debug APK
      working-directory: android
      run: |
        echo "Building APK..."
        ./gradlew assembleDebug --stacktrace --info
      
    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: knets-jr-debug-apk
        path: android/app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30
        if-no-files-found: error
        
    - name: Find and prepare APK
      working-directory: android
      run: |
        echo "APK build completed successfully!"
        echo "Searching for APK files..."
        find . -name "*.apk" -type f -exec ls -la {} \;
        
        echo "Creating outputs directory structure..."
        mkdir -p app/build/outputs/apk/debug/
        
        echo "Finding and copying APK to expected location..."
        APK_FILE=$(find . -name "*.apk" -type f | head -n 1)
        if [ -n "$APK_FILE" ]; then
          echo "Found APK: $APK_FILE"
          cp "$APK_FILE" app/build/outputs/apk/debug/app-debug.apk
          echo "APK copied to: app/build/outputs/apk/debug/app-debug.apk"
          ls -la app/build/outputs/apk/debug/
        else
          echo "No APK file found!"
          exit 1
        fi
