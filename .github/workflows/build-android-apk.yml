name: Build Android APK (Manual SDK)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 11
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'

    - name: Setup Android SDK manually
      run: |
        echo "Installing Android SDK manually..."
        
        # Create SDK directory
        mkdir -p $HOME/android-sdk
        cd $HOME/android-sdk
        
        # Download command line tools
        wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
        unzip -q commandlinetools-linux-9477386_latest.zip
        
        # Create proper directory structure
        mkdir -p cmdline-tools/latest
        mv cmdline-tools/* cmdline-tools/latest/ 2>/dev/null || true
        
        # Set environment variables
        echo "ANDROID_HOME=$HOME/android-sdk" >> $GITHUB_ENV
        echo "ANDROID_SDK_ROOT=$HOME/android-sdk" >> $GITHUB_ENV
        echo "$HOME/android-sdk/cmdline-tools/latest/bin" >> $GITHUB_PATH
        echo "$HOME/android-sdk/platform-tools" >> $GITHUB_PATH
        
        # Install required packages
        yes | $HOME/android-sdk/cmdline-tools/latest/bin/sdkmanager --licenses
        $HOME/android-sdk/cmdline-tools/latest/bin/sdkmanager "platform-tools" "platforms;android-33" "build-tools;33.0.0"

    - name: Make gradlew executable
      working-directory: android
      run: chmod +x gradlew

    - name: Build debug APK
      working-directory: android
      run: |
        echo "Building APK..."
        ./gradlew clean assembleDebug --stacktrace
        
        echo "Searching for APK files..."
        find . -name "*.apk" -type f -exec ls -la {} \;
        
        # Ensure output directory exists
        mkdir -p app/build/outputs/apk/debug
        
        # Copy any found APK to standard location
        APK_FILE=$(find . -name "*.apk" -type f | head -n 1)
        if [ -n "$APK_FILE" ]; then
          echo "Found APK: $APK_FILE"
          cp "$APK_FILE" app/build/outputs/apk/debug/app-debug.apk
        else
          echo "No APK file found!"
          exit 1
        fi

    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: knets-jr-apk
        path: android/app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30
